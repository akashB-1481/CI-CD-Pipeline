apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cicd
  namespace: cicd
  labels:
    app: nginx-cicd
spec:
  selector:
    matchLabels:
      app: nginx-cicd
  replicas: 1

  template:
    metadata:
      labels:
        app: nginx-cicd
    spec:
      # initContainers:
      # Init containers are exactly like regular containers, except:
      # - Init containers always run to completion.
      # - Each init container must complete successfully before the next one starts.
      containers:
        - name: nginx-cicd
          image: nginx:latest
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 300m
              memory: 200Mi
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
            periodSeconds: 10

          ports:
            - containerPort: 80
              name: nginx-cicd
          volumes:
            - name: nginx-cm
              configMap:
                name: nginx-cm
              mountPath: /var/www/html
              subPath: index.html
